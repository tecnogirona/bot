<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>SAT PRO - Gestión Integral</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
  * { transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
  body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
  body.dark { background-color: #0f172a; color: #e2e8f0; }
  body.dark .flat-card, body.dark .bg-white { background-color: #1e293b; border-color: #334155; }
  body.dark .text-slate-700, body.dark .text-slate-800 { color: #e2e8f0; }
  body.dark .text-slate-500, body.dark .text-slate-400 { color: #94a3b8; }
  body.dark .bg-slate-50 { background-color: #0f172a; }
  body.dark .border-slate-100, body.dark .border-slate-200 { border-color: #334155; }
  body.dark input, body.dark select, body.dark textarea { background-color: #334155; border-color: #475569; color: white; }
  body.dark .metric-box { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .flat-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
  .btn-small { padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
  .sidebar-link { display: flex; align-items: center; padding: 10px 12px; color: #64748b; border-radius: 6px; margin-bottom: 4px; cursor: pointer; }
  .sidebar-link.active { background-color: #f1f5f9; color: #0f172a; font-weight: 500; }
  body.dark .sidebar-link.active { background-color: #334155; color: #f1f5f9; }
  .sidebar-link:hover:not(.active) { background-color: #f8fafc; color: #334155; }
  body.dark .sidebar-link:hover:not(.active) { background-color: #334155; color: #f1f5f9; }
  .detail-row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
  .detail-label { font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
  .badge-guarantee { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
  .badge-in-warranty { background-color: #dcfce7; color: #166534; }
  .badge-expired { background-color: #fee2e2; color: #991b1b; }
  .badge-days-left { background-color: #fef3c7; color: #92400e; }
  .metric-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; padding: 15px; text-align: center; }
  .metric-box h3 { font-size: 1.5rem; font-weight: 700; margin: 8px 0; }
  .chart-container { position: relative; height: 250px; margin-bottom: 20px; }
  .user-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
  .user-badge.daniel { background-color: #dbeafe; color: #1e40af; }
  .user-badge.jose { background-color: #fce7f3; color: #be185d; }
  .user-badge.david { background-color: #d1fae5; color: #065f46; }
  .form-section { background: #f8fafc; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
  .form-section-title { font-weight: 600; margin-bottom: 0.75rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .profit-positive { color: #10b981; font-weight: bold; }
  .profit-negative { color: #ef4444; font-weight: bold; }
  .price-preview { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.8rem; }
  .alert-card { transition: all 0.2s; cursor: pointer; border-left-width: 4px; margin-bottom: 8px; padding: 10px; border-radius: 8px; }
  .alert-card.critical { border-left-color: #ef4444; background: #fef2f2; }
  body.dark .alert-card.critical { background: #450a0a; }
  .alert-card.warning { border-left-color: #f59e0b; background: #fffbeb; }
  body.dark .alert-card.warning { background: #451a03; }
  .alert-card.info { border-left-color: #3b82f6; background: #eff6ff; }
  body.dark .alert-card.info { background: #172554; }
  .suggestion-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid; }
  .suggestion-card.critical { border-left-color: #ef4444; background: #fef2f2; }
  .suggestion-card.warning { border-left-color: #f59e0b; background: #fffbeb; }
  .suggestion-card.success { border-left-color: #10b981; background: #ecfdf5; }
  body.dark .suggestion-card { background: #1e293b; }
  body.dark .suggestion-card.critical { background: #450a0a; }
  body.dark .suggestion-card.warning { background: #451a03; }
  body.dark .suggestion-card.success { background: #064e3b; }
  .thumbnail-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; }
  @media (max-width: 768px) {
    .sidebar-link span { display: none; }
    .sidebar-link i { margin-right: 0 !important; }
    aside { width: 60px; }
    .p-6 { padding: 1rem; }
  }
  .table-responsive { overflow-x: auto; }
  .print-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
  .print-footer { text-align: center; margin-top: 30px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 10px; }
  .print-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
  .print-table th, .print-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  .print-table th { background-color: #f2f2f2; }
  .signature-line { margin-top: 40px; display: flex; justify-content: space-between; }
  .signature-item { text-align: center; width: 200px; }
  .range-selector { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 15px; }
  .range-btn { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; background: #f1f5f9; border: none; }
  .range-btn.active { background: #3b82f6; color: white; }
  body.dark .range-btn { background: #334155; color: #e2e8f0; }
  body.dark .range-btn.active { background: #3b82f6; color: white; }
  .btn-config { background: #3b82f6; color: white; padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; margin-right: 0.5rem; margin-top: 0.5rem; }
  .btn-config.danger { background: #ef4444; }
  .btn-config.secondary { background: #64748b; }
</style>
</head>
<body class="bg-slate-100">
<div id="app"></div>

<script>
// ======================== BASES DE DATOS ========================
const userDB = new Dexie("SAT_Users_V3");
userDB.version(1).stores({ users: "++id, name, role, pass" });

const mainDB = new Dexie("SAT_Gestion_V3");
mainDB.version(1).stores({
  piezas: '++id, nombre, cantidad, proveedor, precioCompra, precioVenta, referencia, fechaTrami, estado, observaciones, imagen, fecha, usuario',
  pedidos: '++id, cliente, producto, precioCompra, precioVenta, cantidad, referencia, fechaTrami, estado, observaciones, fecha, usuario',
  reparaciones: '++id, ot, marca, modelo, serie, cliente, telefono, email, diagnostico, precio, estado, prioridad, accesorios, password, imagen, fecha, usuario',
  recordatorios: '++id, title, description, dueDate, priority, completed, createdAt'
});

let currentUser = null;
let currentSection = 'dashboard';
let charts = {};
let currentRange = 6;
const IVA = 21;

// ======================== INICIALIZACIÓN USUARIOS ========================
async function initUsers() {
  await userDB.open();
  const admin = await userDB.users.where("name").equals("Daniel Farré").first();
  if (!admin) {
    await userDB.users.clear();
    await userDB.users.bulkAdd([
      { name: "Daniel Farré", role: "admin", pass: "1234" },
      { name: "José Ayala", role: "user", pass: "1234" },
      { name: "David Varillas", role: "user", pass: "1234" }
    ]);
  }
}

// ======================== LOGIN / LOGOUT ========================
async function login() {
  const name = document.getElementById("login_name").value.trim();
  const pass = document.getElementById("login_pass").value.trim();
  const users = await userDB.users.toArray();
  const found = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
  if (found) {
    currentUser = found;
    localStorage.setItem("sat_user", JSON.stringify(currentUser));
    renderApp();
  } else {
    alert("Usuario o contraseña incorrectos");
  }
}

function logout() {
  localStorage.removeItem("sat_user");
  location.reload();
}

// ======================== RENDER PRINCIPAL ========================
function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div class="flex h-screen items-center justify-center bg-slate-100">
      <div class="bg-white p-6 rounded-xl shadow w-80">
        <h2 class="text-xl font-bold mb-4 text-center">SAT PRO</h2>
        <input id="login_name" placeholder="Usuario" class="w-full mb-2 p-2 border rounded">
        <input id="login_pass" type="password" placeholder="Contraseña" class="w-full mb-4 p-2 border rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Entrar</button>
      </div>
    </div>
  `;
}

async function renderApp() {
  const isDark = localStorage.getItem("darkMode") === "true";
  if (isDark) document.body.classList.add("dark");
  else document.body.classList.remove("dark");
  
  document.getElementById("app").innerHTML = `
    <div class="flex h-screen overflow-hidden">
      <aside class="w-16 md:w-64 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col">
        <div class="p-4 border-b border-slate-100">
          <div class="flex items-center justify-center md:justify-start gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="wrench" class="w-5 h-5"></i></div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight hidden md:block">SAT PRO</h1>
          </div>
        </div>
        <nav class="flex-1 p-3 overflow-y-auto">
          <a href="#" onclick="changeSection('dashboard')" id="link-dashboard" class="sidebar-link active"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Resumen</span></a>
          <a href="#" onclick="changeSection('reparaciones')" id="link-reparaciones" class="sidebar-link"><i data-lucide="check-square" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Reparaciones</span></a>
          <a href="#" onclick="changeSection('piezas')" id="link-piezas" class="sidebar-link"><i data-lucide="package" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Piezas</span></a>
          <a href="#" onclick="changeSection('pedidos')" id="link-pedidos" class="sidebar-link"><i data-lucide="shopping-cart" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Pedidos</span></a>
          <a href="#" onclick="changeSection('reportes')" id="link-reportes" class="sidebar-link"><i data-lucide="bar-chart-3" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Reportes</span></a>
          <a href="#" onclick="changeSection('configuracion')" id="link-configuracion" class="sidebar-link"><i data-lucide="settings" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Configuración</span></a>
          ${currentUser.role === 'admin' ? `<a href="#" onclick="changeSection('users')" id="link-users" class="sidebar-link"><i data-lucide="users" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Usuarios</span></a>` : ''}
        </nav>
        <div class="p-3 border-t border-slate-100 text-[10px] text-slate-400 text-center hidden md:block">v6.0 © 2025</div>
      </aside>
      <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8">
          <h2 id="section-title" class="text-sm md:text-lg font-semibold text-slate-700 truncate">Resumen General</h2>
          <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleDarkMode()" id="dark-mode-btn" class="text-slate-600 hover:text-slate-800 p-1.5 rounded-full"><i data-lucide="moon" class="w-4 h-4"></i></button>
            <button onclick="openModal()" id="btn-new" class="bg-blue-600 hover:bg-blue-700 text-white text-xs md:text-sm px-3 md:px-4 py-1.5 rounded-md font-medium flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i><span class="hidden sm:inline">Nuevo</span></button>
            <button onclick="logout()" class="text-xs md:text-sm text-slate-600">Salir</button>
          </div>
        </header>
        <div class="flex-1 overflow-y-auto p-3 md:p-8" id="view"></div>
      </main>
    </div>
  `;
  lucide.createIcons();
  await changeSection('dashboard');
}

// ======================== NAVEGACIÓN ========================
async function changeSection(section) {
  currentSection = section;
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const link = document.getElementById(`link-${section}`);
  if (link) link.classList.add('active');
  
  const titles = {
    dashboard: 'Resumen General',
    reparaciones: 'Órdenes de Reparación',
    piezas: 'Pedido de Piezas',
    pedidos: 'Pedidos de Clientes',
    reportes: 'Reportes y Métricas',
    configuracion: 'Configuración',
    users: 'Gestión de Usuarios'
  };
  document.getElementById('section-title').textContent = titles[section] + (currentUser ? ` - ${currentUser.name}` : '');
  const btnNew = document.getElementById('btn-new');
  if (btnNew) btnNew.style.display = (section === 'reportes' || section === 'configuracion' || section === 'users') ? 'none' : 'flex';
  
  const view = document.getElementById('view');
  if (section === 'dashboard') await renderDashboard(view);
  else if (section === 'reparaciones') await renderList(view, 'reparaciones');
  else if (section === 'piezas') await renderList(view, 'piezas');
  else if (section === 'pedidos') await renderList(view, 'pedidos');
  else if (section === 'reportes') await renderReports(view);
  else if (section === 'configuracion') await renderConfiguracion(view);
  else if (section === 'users') await renderUsers(view);
}

// ======================== DASHBOARD ========================
async function renderDashboard(container) {
  const piezas = await mainDB.piezas.toArray();
  const pedidos = await mainDB.pedidos.toArray();
  const reparaciones = await mainDB.reparaciones.toArray();
  let beneficioTotal = 0;
  pedidos.forEach(p => { const c=parseFloat(p.precioCompra)||0; const v=parseFloat(p.precioVenta)||0; const cant=parseInt(p.cantidad)||1; beneficioTotal+=(v-c)*cant; });
  piezas.forEach(p => { if(p.estado==='Vendido'||p.estado==='Instalado') { const c=parseFloat(p.precioCompra)||0; const v=parseFloat(p.precioVenta)||0; beneficioTotal+=(v-c)*(parseInt(p.cantidad)||1); } });
  
  const allActivity = [];
  piezas.slice(-2).forEach(p=>p.nombre&&allActivity.push({ text:`Pieza: ${p.nombre}`, date:p.fecha?new Date(p.fecha):new Date(), icon:'package', usuario:p.usuario||'Sin asignar' }));
  pedidos.slice(-2).forEach(p=>p.cliente&&allActivity.push({ text:`Pedido: ${p.producto} - ${p.cliente}`, date:p.fecha?new Date(p.fecha):new Date(), icon:'shopping-cart', usuario:p.usuario||'Sin asignar' }));
  reparaciones.slice(-2).forEach(r=>r.ot&&allActivity.push({ text:`Reparación OT: ${r.ot}`, date:r.fecha?new Date(r.fecha):new Date(), icon:'check-square', usuario:r.usuario||'Sin asignar' }));
  allActivity.sort((a,b)=>b.date-a.date);
  
  container.innerHTML = `
    <div class="space-y-4">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="flat-card p-3 flex items-center gap-2"><div class="bg-blue-50 text-blue-600 p-2 rounded-full"><i data-lucide="package" class="w-4 h-4"></i></div><div><p class="text-xs text-slate-500">Piezas Pedidas</p><h3 class="text-xl font-bold">${piezas.filter(p=>p.estado==='Pedido').length}</h3></div></div>
        <div class="flat-card p-3 flex items-center gap-2"><div class="bg-green-50 text-green-600 p-2 rounded-full"><i data-lucide="shopping-cart" class="w-4 h-4"></i></div><div><p class="text-xs text-slate-500">Pedidos Activos</p><h3 class="text-xl font-bold">${pedidos.filter(p=>p.estado && p.estado!=='Entregado').length}</h3></div></div>
        <div class="flat-card p-3 flex items-center gap-2"><div class="bg-amber-50 text-amber-600 p-2 rounded-full"><i data-lucide="clock" class="w-4 h-4"></i></div><div><p class="text-xs text-slate-500">Reparaciones Urgentes</p><h3 class="text-xl font-bold">${reparaciones.filter(r=>r.prioridad==='Alta' && r.estado!=='Completado').length}</h3></div></div>
        <div class="flat-card p-3 flex items-center gap-2"><div class="bg-purple-50 text-purple-600 p-2 rounded-full"><i data-lucide="trending-up" class="w-4 h-4"></i></div><div><p class="text-xs text-slate-500">Beneficio Total</p><h3 class="text-xl font-bold text-green-600">${beneficioTotal.toFixed(2)}€</h3></div></div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="flat-card p-4"><h4 class="font-bold mb-2"><i data-lucide="activity" class="w-4 h-4 inline mr-1"></i> Actividad Reciente</h4><div id="recent-activity">${allActivity.slice(0,5).map(act => `<div class="flex items-center gap-2 text-sm my-2"><i data-lucide="${act.icon}" class="w-3 h-3"></i><span>${act.text}</span><span class="text-xs text-slate-400">${act.date.toLocaleString()}</span></div>`).join('')}</div></div>
        <div class="flat-card p-4"><div class="flex justify-between items-center mb-2"><h4 class="font-bold"><i data-lucide="bell" class="w-4 h-4 inline mr-1"></i> Recordatorios</h4><button onclick="openReminderModal()" class="text-xs bg-amber-100 px-2 py-1 rounded">+ Nuevo</button></div><div id="alert-container">Cargando...</div><div class="mt-3"><button onclick="generateAISuggestions()" class="w-full text-xs bg-gradient-to-r from-purple-500 to-pink-500 text-white py-2 rounded">🤖 Sugerencias IA</button></div></div>
      </div>
    </div>
  `;
  lucide.createIcons();
  await updateIntelligentAlerts();
}

// ======================== LISTADOS CRUD ========================
async function renderList(container, section) {
  const data = await mainDB[section].toArray();
  let headers = [];
  if (section === 'piezas') headers = ['Pieza', 'Proveedor', 'P.Compra', 'P.Venta', 'Usuario', 'Estado', 'Fecha', 'Imagen'];
  else if (section === 'pedidos') headers = ['Producto', 'Cliente', 'P.Compra', 'P.Venta', 'Estado', 'Fecha'];
  else headers = ['OT', 'Cliente', 'Equipo', 'Precio', 'Estado', 'Fecha', 'Imagen'];
  
  let html = `<div class="flat-card overflow-hidden"><div class="table-responsive"><table class="w-full text-left text-xs"><thead class="bg-slate-50"><tr>${headers.map(h=>`<th class="p-2">${h}</th>`).join('')}<th class="p-2 text-right">Acciones</th></tr></thead><tbody>`;
  if (data.length === 0) html += `<tr><td colspan="10" class="p-4 text-center text-slate-400">No hay registros</td></tr>`;
  for (const item of data) {
    let userClass = '';
    if (item.usuario === 'Daniel Farré') userClass = 'daniel';
    else if (item.usuario === 'José Ayala') userClass = 'jose';
    else if (item.usuario === 'David Varillas') userClass = 'david';
    let content = '';
    if (section === 'piezas') {
      content = `<td class="p-2">${escapeHtml(item.nombre||'-')}</td><td class="p-2">${escapeHtml(item.proveedor||'-')}</td><td class="p-2">${item.precioCompra||'-'}€</td><td class="p-2">${item.precioVenta||'-'}€</td><td class="p-2"><span class="user-badge ${userClass}">${item.usuario}</span></td><td class="p-2"><span class="px-1 py-0.5 rounded-full text-[10px] font-bold bg-amber-100">${item.estado}</span></td><td class="p-2">${new Date(item.fecha).toLocaleDateString()}</td><td class="p-2">${item.imagen ? `<img src="${item.imagen}" class="thumbnail-img" onclick="showImageModal('${item.imagen}')">` : '-'}</td>`;
    } else if (section === 'pedidos') {
      content = `<td class="p-2">${escapeHtml(item.producto||'-')}</td><td class="p-2">${escapeHtml(item.cliente||'-')}</td><td class="p-2">${item.precioCompra||'-'}€</td><td class="p-2">${item.precioVenta||'-'}€</td><td class="p-2"><span class="px-1 py-0.5 rounded-full text-[10px] font-bold bg-amber-100">${item.estado}</span></td><td class="p-2">${new Date(item.fecha).toLocaleDateString()}</td>`;
    } else {
      content = `<td class="p-2">${escapeHtml(item.ot||'-')}</td><td class="p-2">${escapeHtml(item.cliente||'-')}</td><td class="p-2">${escapeHtml(item.marca)} ${escapeHtml(item.modelo)}</td><td class="p-2">${item.precio?item.precio+'€':'-'}</td><td class="p-2"><span class="px-1 py-0.5 rounded-full text-[10px] font-bold bg-amber-100">${item.estado}</span></td><td class="p-2">${new Date(item.fecha).toLocaleDateString()}</td><td class="p-2">${item.imagen ? `<img src="${item.imagen}" class="thumbnail-img" onclick="showImageModal('${item.imagen}')">` : '-'}</td>`;
    }
    html += `<tr class="hover:bg-slate-50">${content}<td class="p-2 text-right space-x-1"><button onclick='viewDetail("${section}", ${item.id})' class="btn-small bg-slate-100 p-1"><i data-lucide="eye" class="w-3 h-3"></i></button><button onclick='editRecord("${section}", ${item.id})' class="btn-small bg-slate-100 p-1"><i data-lucide="edit-2" class="w-3 h-3"></i></button><button onclick='deleteRecord("${section}", ${item.id})' class="btn-small bg-slate-100 p-1"><i data-lucide="trash" class="w-3 h-3"></i></button><button onclick='printFromList("${section}", ${item.id})' class="btn-small bg-slate-100 p-1"><i data-lucide="printer" class="w-3 h-3"></i></button></td></tr>`;
  }
  html += `</tbody></table></div></div>`;
  container.innerHTML = html;
  lucide.createIcons();
}

// ======================== REPORTES COMPLETOS ========================
async function renderReports(container) {
  container.innerHTML = `
    <div class="space-y-4">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3"><div class="metric-box blue"><p>💰 Ingresos</p><h3 id="kpi-ingresos">0€</h3></div><div class="metric-box"><p>📦 Coste Piezas</p><h3 id="kpi-coste-piezas">0€</h3></div><div class="metric-box green"><p>📈 Beneficio</p><h3 id="kpi-beneficio">0€</h3></div><div class="metric-box orange"><p>📊 Margen</p><h3 id="kpi-margen">0%</h3></div></div>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-2"><div class="flat-card p-2 text-center"><p class="text-xs">Total Pedidos</p><h3 id="kpi-total-pedidos" class="text-xl">0</h3></div><div class="flat-card p-2 text-center"><p class="text-xs">Entregados</p><h3 id="kpi-pedidos-entregados" class="text-xl">0</h3></div><div class="flat-card p-2 text-center"><p class="text-xs">Reparaciones OK</p><h3 id="kpi-reparaciones-completadas" class="text-xl">0</h3></div><div class="flat-card p-2 text-center"><p class="text-xs">Piezas Pedidas</p><h3 id="kpi-piezas-pendientes" class="text-xl">0</h3></div><div class="flat-card p-2 text-center"><p class="text-xs">Tasa Entrega</p><h3 id="kpi-tasa-entrega" class="text-xl">0%</h3></div></div>
      <div class="flat-card p-4"><h4 class="font-bold mb-2">📈 Evolución Mensual Ingresos</h4><div class="chart-container"><canvas id="chart-evolucion-mensual"></canvas></div></div>
      <div class="flat-card p-4"><div class="flex justify-between items-center"><h4 class="font-bold">👥 Evolución por Técnico</h4><div class="range-selector"><button class="range-btn" data-months="3">3m</button><button class="range-btn active" data-months="6">6m</button><button class="range-btn" data-months="12">12m</button></div></div><div class="chart-container"><canvas id="chart-evolucion-usuarios"></canvas></div><div id="user-summary" class="grid grid-cols-3 gap-2 mt-2 text-center text-xs"></div></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="flat-card p-4"><h4 class="font-bold mb-2">🏆 Ranking Usuarios</h4><div id="ranking-usuarios"></div></div><div class="flat-card p-4"><h4 class="font-bold mb-2">📊 Rendimiento por Usuario</h4><div class="chart-container"><canvas id="chart-operaciones-usuario"></canvas></div></div></div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4"><div class="flat-card p-4"><h4 class="font-bold mb-2">🥧 Estado Pedidos</h4><div class="chart-container"><canvas id="chart-pedidos-estado"></canvas></div></div><div class="flat-card p-4"><h4 class="font-bold mb-2">🥧 Estado Reparaciones</h4><div class="chart-container"><canvas id="chart-reparaciones-estado"></canvas></div></div></div>
      <div class="flat-card p-4"><h4 class="font-bold mb-2">📋 Detalle Ventas</h4><div class="table-responsive"><table class="w-full text-xs"><thead><tr><th>Producto</th><th>Tipo</th><th>Compra</th><th>Venta</th><th>Beneficio</th><th>Margen</th><th>Estado</th></tr></thead><tbody id="detalle-ventas-tbody"></tbody></table></div></div>
    </div>
  `;
  await updateReportsStats();

async function updateReportsStats() {
  const piezas = await mainDB.piezas.toArray();
  const pedidos = await mainDB.pedidos.toArray();
  const reparaciones = await mainDB.reparaciones.toArray();
  let ingresos=0, coste=0;
  pedidos.forEach(p=>{ ingresos+= (parseFloat(p.precioVenta)||0)*(parseInt(p.cantidad)||1); coste+= (parseFloat(p.precioCompra)||0)*(parseInt(p.cantidad)||1); });
  piezas.forEach(p=>{ if(p.estado==='Vendido'||p.estado==='Instalado'){ ingresos+=parseFloat(p.precioVenta)||0; coste+=parseFloat(p.precioCompra)||0; } });
  ingresos += reparaciones.reduce((s,r)=>s+(parseFloat(r.precio)||0),0);
  const beneficio = ingresos - coste;
  const margen = ingresos>0 ? (beneficio/ingresos*100).toFixed(1) : 0;
  document.getElementById('kpi-ingresos').textContent = ingresos.toFixed(2)+'€';
  document.getElementById('kpi-coste-piezas').textContent = coste.toFixed(2)+'€';
  document.getElementById('kpi-beneficio').textContent = beneficio.toFixed(2)+'€';
  document.getElementById('kpi-margen').textContent = margen+'%';
  document.getElementById('kpi-total-pedidos').textContent = pedidos.length;
  document.getElementById('kpi-pedidos-entregados').textContent = pedidos.filter(p=>p.estado==='Entregado').length;
  document.getElementById('kpi-reparaciones-completadas').textContent = reparaciones.filter(r=>r.estado==='Completado'||r.estado==='Entregado').length;
  document.getElementById('kpi-piezas-pendientes').textContent = piezas.filter(p=>p.estado==='Pedido').length;
  document.getElementById('kpi-tasa-entrega').textContent = pedidos.length? Math.round(pedidos.filter(p=>p.estado==='Entregado').length/pedidos.length*100) : 0 + '%';
  
  // Gráficos
  const ctxEvo = document.getElementById('chart-evolucion-mensual')?.getContext('2d');
  if(ctxEvo) {
    if(charts.evolucionMensual) charts.evolucionMensual.destroy();
    const hoy = new Date();
    const meses = [], ingresosMensuales = [];
    for(let i=5;i>=0;i--) {
      let fecha = new Date(hoy.getFullYear(), hoy.getMonth()-i,1);
      meses.push(fecha.toLocaleDateString('es',{month:'short',year:'numeric'}));
      let inicio = new Date(fecha.getFullYear(), fecha.getMonth(),1);
      let fin = new Date(fecha.getFullYear(), fecha.getMonth()+1,0);
      let total = pedidos.reduce((s,p)=>{ let d=new Date(p.fecha); if(d>=inicio && d<=fin) return s+((parseFloat(p.precioVenta)||0)*(parseInt(p.cantidad)||1)); return s; },0);
      ingresosMensuales.push(total);
    }
    charts.evolucionMensual = new Chart(ctxEvo, { type:'line', data:{ labels:meses, datasets:[{ label:'Ingresos (€)', data:ingresosMensuales, borderColor:'#10b981', tension:0.3, fill:true, backgroundColor:'rgba(16,185,129,0.1)' }] }, options:{ responsive:true, maintainAspectRatio:false } });
  }
  const users = ["Daniel Farré","José Ayala","David Varillas"];
  const colores = { "Daniel Farré":"#3b82f6", "José Ayala":"#ef4444", "David Varillas":"#10b981" };
  const ctxEvoUsers = document.getElementById('chart-evolucion-usuarios')?.getContext('2d');
  if(ctxEvoUsers) {
    if(charts.evolucionUsuarios) charts.evolucionUsuarios.destroy();
    const hoy = new Date();
    const meses = [];
    for(let i=currentRange-1;i>=0;i--) meses.push(new Date(hoy.getFullYear(), hoy.getMonth()-i,1).toLocaleDateString('es',{month:'short',year:'2-digit'}));
    const datasets = [];
    for(let u of users) {
      let datos = [];
      for(let i=currentRange-1;i>=0;i--) {
        let inicio = new Date(hoy.getFullYear(), hoy.getMonth()-i,1);
        let fin = new Date(hoy.getFullYear(), hoy.getMonth()-i+1,0);
        let total = pedidos.reduce((s,p)=>{ if(p.usuario===u && p.fecha){ let d=new Date(p.fecha); if(d>=inicio && d<=fin) return s+((parseFloat(p.precioVenta)||0)*(parseInt(p.cantidad)||1)); } return s; },0);
        datos.push(total);
      }
      datasets.push({ label:u, data:datos, borderColor:colores[u], backgroundColor:'transparent', tension:0.3, fill:false, pointBackgroundColor:colores[u] });
    }
    charts.evolucionUsuarios = new Chart(ctxEvoUsers, { type:'line', data:{ labels:meses, datasets }, options:{ responsive:true, maintainAspectRatio:false } });
    document.getElementById('user-summary').innerHTML = users.map(u => `<div style="background:${colores[u]}20; border-left:3px solid ${colores[u]}" class="p-1 rounded"><b>${u}</b><br>Total: ${datasets.find(d=>d.label===u).data.reduce((a,b)=>a+b,0).toFixed(2)}€</div>`).join('');
  }
  // Ranking usuarios
  const ranking = users.map(u => ({ usuario:u, pedidos:pedidos.filter(p=>p.usuario===u).length, piezas:piezas.filter(p=>p.usuario===u).length, reparaciones:reparaciones.filter(r=>r.usuario===u).length, total:0 }));
  ranking.forEach(r=> r.total = r.pedidos+r.piezas+r.reparaciones);
  ranking.sort((a,b)=>b.total-a.total);
  document.getElementById('ranking-usuarios').innerHTML = ranking.map(r => `<div class="flex justify-between p-2 bg-slate-50 rounded mb-1"><span>${r.usuario}</span><span>📦${r.pedidos} 🔧${r.reparaciones} 🧩${r.piezas}</span><span class="font-bold">${r.total}</span></div>`).join('');
  // Gráfico operaciones usuario
  const ctxOp = document.getElementById('chart-operaciones-usuario')?.getContext('2d');
  if(ctxOp) {
    if(charts.operacionesUsuario) charts.operacionesUsuario.destroy();
    charts.operacionesUsuario = new Chart(ctxOp, { type:'bar', data:{ labels:users, datasets:[{ label:'Pedidos', data:users.map(u=>pedidos.filter(p=>p.usuario===u).length), backgroundColor:'#3b82f6' },{ label:'Piezas', data:users.map(u=>piezas.filter(p=>p.usuario===u).length), backgroundColor:'#8b5cf6' },{ label:'Reparaciones', data:users.map(u=>reparaciones.filter(r=>r.usuario===u).length), backgroundColor:'#ec4899' }] }, options:{ responsive:true, maintainAspectRatio:false } });
  }
  // Estado pedidos
  const estadosPed = {};
  pedidos.forEach(p=>estadosPed[p.estado]=(estadosPed[p.estado]||0)+1);
  const ctxPed = document.getElementById('chart-pedidos-estado')?.getContext('2d');
  if(ctxPed) { if(charts.pedidosEstado) charts.pedidosEstado.destroy(); charts.pedidosEstado = new Chart(ctxPed, { type:'doughnut', data:{ labels:Object.keys(estadosPed), datasets:[{ data:Object.values(estadosPed), backgroundColor:['#667eea','#764ba2','#f093fb','#f5576c'] }] }, options:{ responsive:true } }); }
  // Estado reparaciones
  const estadosRep = {};
  reparaciones.forEach(r=>estadosRep[r.estado]=(estadosRep[r.estado]||0)+1);
  const ctxRep = document.getElementById('chart-reparaciones-estado')?.getContext('2d');
  if(ctxRep) { if(charts.reparacionesEstado) charts.reparacionesEstado.destroy(); charts.reparacionesEstado = new Chart(ctxRep, { type:'doughnut', data:{ labels:Object.keys(estadosRep), datasets:[{ data:Object.values(estadosRep), backgroundColor:['#4facfe','#00f2fe','#43e97b','#fa709a'] }] }, options:{ responsive:true } }); }
  // Detalle ventas
  const items = [];
  pedidos.forEach(p=>{ const c=parseFloat(p.precioCompra)||0, v=parseFloat(p.precioVenta)||0, cant=parseInt(p.cantidad)||1; items.push({ nombre:p.producto, tipo:'Pedido', compra:c*cant, venta:v*cant, beneficio:(v-c)*cant, margen:v>0?((v-c)/v*100).toFixed(1):0, estado:p.estado }); });
  piezas.forEach(p=>{ if(p.precioVenta && p.precioCompra){ const c=parseFloat(p.precioCompra)||0, v=parseFloat(p.precioVenta)||0; items.push({ nombre:p.nombre, tipo:'Pieza', compra:c, venta:v, beneficio:v-c, margen:v>0?((v-c)/v*100).toFixed(1):0, estado:p.estado }); } });
  items.sort((a,b)=>b.beneficio-a.beneficio);
  document.getElementById('detalle-ventas-tbody').innerHTML = items.slice(0,15).map(i=>`<tr><td>${i.nombre}</td><td>${i.tipo}</td><td>${i.compra.toFixed(2)}€</td><td>${i.venta.toFixed(2)}€</td><td class="${i.beneficio>=0?'profit-positive':'profit-negative'}">${i.beneficio.toFixed(2)}€</td><td>${i.margen}%</td><td>${i.estado}</td></tr>`).join('');
}

async function renderUsers(container) {
  const users = await userDB.users.toArray();
  container.innerHTML = `
    <div class="max-w-lg mx-auto">
      <h2 class="text-xl font-bold mb-4">Usuarios</h2>
      ${users.map(u => `<div class="flex justify-between items-center bg-white p-2 rounded shadow mb-2"><span>${u.name} (${u.role})</span>${u.name !== 'Daniel Farré' ? `<button onclick="deleteUser(${u.id})" class="text-red-500">Eliminar</button>` : ''}</div>`).join('')}
      <div class="mt-4 flex gap-2"><input id="newUserName" placeholder="Nombre" class="border p-2 flex-1 rounded"><input id="newUserPass" placeholder="Contraseña" class="border p-2 flex-1 rounded"><button onclick="addUser()" class="bg-blue-600 text-white px-4 rounded">Añadir</button></div>
    </div>
  `;
}
async function addUser() {
  const name = document.getElementById("newUserName").value.trim();
  const pass = document.getElementById("newUserPass").value.trim();
  if(!name || !pass) return alert("Complete nombre y contraseña");
  await userDB.users.add({ name, role: "user", pass });
  renderUsers(document.getElementById("view"));
}
async function deleteUser(id) {
  if(confirm("¿Eliminar usuario?")){ await userDB.users.delete(id); renderUsers(document.getElementById("view")); }
}

function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); const btn=document.getElementById('dark-mode-btn'); if(btn) btn.innerHTML = document.body.classList.contains('dark') ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>'; lucide.createIcons(); }
