<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT PRO FIX</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>

</head>

<body class="bg-slate-100">

<div id="app"></div>

<script>

// ================= DB =================
const db = new Dexie("SAT_PRO_V2");

db.version(1).stores({
  users: "++id,name",
});

// 🔥 INIT ROBUSTO (clave)
async function initDB() {
  await db.open();

  const existing = await db.users
    .where("name")
    .equals("Daniel Farré")
    .first();

  // 👉 Si Daniel no existe, recreamos usuarios
  if (!existing) {
    await db.users.clear();

    await db.users.bulkAdd([
      { name: "Daniel Farré", role: "admin", pass: "1234" },
      { name: "José Ayala", role: "user", pass: "1234" },
      { name: "David", role: "user", pass: "1234" }
    ]);
  }
}

// ================= AUTH =================
let currentUser = null;

async function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  const users = await db.users.toArray();

  // 🔥 búsqueda robusta (sin problemas de índice)
  const u = users.find(
    x => x.name.toLowerCase() === user.toLowerCase()
  );

  if (u && u.pass === pass) {
    currentUser = u;
    localStorage.setItem("user", JSON.stringify(u));
    renderApp();
  } else {
    alert("Usuario o contraseña incorrectos");
  }
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// ================= UI =================

function renderLogin() {
  app.innerHTML = `
    <div class="flex h-screen items-center justify-center">
      <div class="bg-white p-6 rounded-xl shadow w-80">
        <h2 class="text-xl font-bold mb-4">SAT PRO</h2>
        <input id="user" placeholder="Usuario" class="w-full mb-2 p-2 border rounded">
        <input id="pass" type="password" placeholder="Contraseña" class="w-full mb-4 p-2 border rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Entrar</button>
      </div>
    </div>
  `;
}

function renderApp() {
  app.innerHTML = `
    <div class="flex h-screen">

      <aside class="w-64 bg-white p-4 shadow">
        <h2 class="font-bold mb-4">SAT PRO</h2>

        <p class="mb-4 text-sm">Usuario: ${currentUser.name}</p>

        <button onclick="renderDashboard()" class="block mb-2">Dashboard</button>

        ${currentUser.role === 'admin' ? '<button onclick="renderUsers()" class="block mb-2">Usuarios</button>' : ''}

        <hr class="my-4">

        <button onclick="logout()">Salir</button>
      </aside>

      <main class="flex-1 p-6" id="view"></main>

    </div>
  `;

  renderDashboard();
}

// ================= DASHBOARD =================
function renderDashboard() {
  view.innerHTML = `
    <h1 class="text-xl font-bold mb-4">Dashboard</h1>
    <div class="bg-white p-4 rounded shadow">
      Sistema funcionando correctamente ✅
    </div>
  `;
}

// ================= USERS =================
async function renderUsers() {
  const users = await db.users.toArray();

  view.innerHTML = `
    <h1 class="text-xl font-bold mb-4">Usuarios</h1>

    ${users.map(u => `
      <div class="bg-white p-2 mb-2 flex justify-between rounded shadow">
        ${u.name} (${u.role})
        <button onclick="deleteUser(${u.id})" class="text-red-500">X</button>
      </div>
    `).join("")}

    <input id="newUser" placeholder="Nuevo usuario" class="border p-2">
    <button onclick="addUser()">Añadir</button>
  `;
}

async function addUser() {
  const name = document.getElementById("newUser").value.trim();
  if (!name) return;

  await db.users.add({ name, role: 'user', pass: '1234' });
  renderUsers();
}

async function deleteUser(id) {
  await db.users.delete(id);
  renderUsers();
}

// ================= INIT =================
window.onload = async () => {
  await initDB();

  const saved = localStorage.getItem("user");

  if (saved) {
    currentUser = JSON.parse(saved);
    renderApp();
  } else {
    renderLogin();
  }
};

</script>

</body>
</html>
