<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>SAT PRO - Gestión Integral</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

<style>
  /* ========== ESTILOS COMPLETOS ========== */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; background-color: #f8fafc; transition: background-color 0.3s, color 0.3s; }
  body.dark { background-color: #0f172a; color: #e2e8f0; }
  body.dark .flat-card { background-color: #1e293b; border-color: #334155; }
  body.dark .flat-card .text-slate-700 { color: #cbd5e1; }
  body.dark .flat-card .text-slate-500 { color: #94a3b8; }
  body.dark .flat-card .text-slate-800 { color: #f1f5f9; }
  body.dark .bg-slate-50 { background-color: #0f172a; }
  body.dark .border-slate-100 { border-color: #334155; }
  body.dark .border-slate-200 { border-color: #334155; }
  body.dark .bg-white { background-color: #1e293b; }
  body.dark .text-slate-600 { color: #cbd5e1; }
  body.dark .text-slate-400 { color: #94a3b8; }
  body.dark .form-section { background-color: #0f172a; border-color: #334155; }
  body.dark input, body.dark select, body.dark textarea { background-color: #334155; border-color: #475569; color: #f1f5f9; }
  body.dark .metric-box { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .flat-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; transition: background-color 0.3s; }
  .btn-small { padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; transition: all 0.2s; cursor: pointer; }
  .sidebar-link { display: flex; align-items: center; padding: 10px 12px; color: #64748b; border-radius: 6px; margin-bottom: 4px; transition: all 0.2s; cursor: pointer; }
  .sidebar-link.active { background-color: #f1f5f9; color: #0f172a; font-weight: 500; }
  body.dark .sidebar-link.active { background-color: #334155; color: #f1f5f9; }
  .sidebar-link:hover:not(.active) { background-color: #f8fafc; color: #334155; }
  body.dark .sidebar-link:hover:not(.active) { background-color: #334155; color: #f1f5f9; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  .detail-row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
  .detail-value { color: #1e293b; font-size: 0.875rem; word-break: break-word; }
  .badge-guarantee { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
  .badge-in-warranty { background-color: #dcfce7; color: #166534; }
  .badge-expired { background-color: #fee2e2; color: #991b1b; }
  .badge-days-left { background-color: #fef3c7; color: #92400e; }
  .metric-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; padding: 15px; text-align: center; }
  .metric-box h3 { font-size: 1.5rem; font-weight: 700; margin: 8px 0; }
  .metric-box p { font-size: 0.7rem; opacity: 0.9; }
  .metric-box.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
  .metric-box.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .metric-box.blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .chart-container { position: relative; height: 250px; margin-bottom: 20px; }
  .user-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
  .user-badge.daniel { background-color: #dbeafe; color: #1e40af; }
  .user-badge.jose { background-color: #fce7f3; color: #be185d; }
  .user-badge.david { background-color: #d1fae5; color: #065f46; }
  .form-section { background: #f8fafc; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
  .form-section-title { font-weight: 600; color: #1e293b; margin-bottom: 0.75rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .profit-positive { color: #10b981; font-weight: bold; }
  .profit-negative { color: #ef4444; font-weight: bold; }
  .price-preview { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.8rem; }
  .alert-card { transition: all 0.2s; cursor: pointer; }
  .alert-card:hover { transform: translateX(4px); }
  .alert-critical { border-left: 4px solid #ef4444; background: #fef2f2; }
  .alert-warning { border-left: 4px solid #f59e0b; background: #fffbeb; }
  .alert-info { border-left: 4px solid #3b82f6; background: #eff6ff; }
  body.dark .alert-critical { background: #450a0a; border-left-color: #ef4444; }
  body.dark .alert-warning { background: #451a03; border-left-color: #f59e0b; }
  body.dark .alert-info { background: #172554; border-left-color: #3b82f6; }
  .suggestion-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid; transition: all 0.2s; }
  body.dark .suggestion-card { background: #1e293b; }
  .suggestion-card.critical { border-left-color: #ef4444; background: #fef2f2; }
  .suggestion-card.warning { border-left-color: #f59e0b; background: #fffbeb; }
  .suggestion-card.success { border-left-color: #10b981; background: #ecfdf5; }
  .suggestion-card.info { border-left-color: #3b82f6; background: #eff6ff; }
  body.dark .suggestion-card.critical { background: #450a0a; }
  body.dark .suggestion-card.warning { background: #451a03; }
  body.dark .suggestion-card.success { background: #064e3b; }
  body.dark .suggestion-card.info { background: #172554; }
  .suggestion-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .thumbnail-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #e2e8f0; }
  .modal-img { max-width: 100%; max-height: 70vh; border-radius: 8px; }
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: white; }
    .no-print { display: none !important; }
    button, .btn-small, .sidebar-link, header, aside { display: none !important; }
  }
  @media (max-width: 768px) {
    .sidebar-link span { display: none; }
    .sidebar-link i { margin-right: 0 !important; }
    aside { width: 60px; }
    .p-6 { padding: 1rem; }
    .px-8 { padding-left: 1rem; padding-right: 1rem; }
    .text-lg { font-size: 1rem; }
    .grid { gap: 0.75rem; }
    .flat-card.p-6 { padding: 1rem; }
    .detail-row { grid-template-columns: 100px 1fr; }
    table { font-size: 0.7rem; }
    td, th { padding: 0.5rem !important; }
  }
  @media (max-width: 480px) {
    .metric-box h3 { font-size: 1.2rem; }
    .btn-small { padding: 2px 4px; }
    .form-section { padding: 0.75rem; }
  }
  .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .print-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
  .print-header h1 { font-size: 24px; margin: 0; }
  .print-header p { color: #666; margin: 5px 0; }
  .print-footer { text-align: center; margin-top: 30px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 10px; color: #666; }
  .print-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
  .print-table th, .print-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  .print-table th { background-color: #f2f2f2; }
  .signature-line { margin-top: 40px; display: flex; justify-content: space-between; }
  .signature-item { text-align: center; width: 200px; }
  .signature-line hr { margin-top: 30px; width: 100%; }
  .range-selector { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 15px; }
  .range-btn { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; background: #f1f5f9; border: none; transition: all 0.2s; }
  .range-btn.active { background: #3b82f6; color: white; }
  body.dark .range-btn { background: #334155; color: #e2e8f0; }
  body.dark .range-btn.active { background: #3b82f6; color: white; }
  .config-group { margin-bottom: 1.5rem; }
  .config-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
  .config-group input, .config-group textarea { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #cbd5e1; background: white; }
  body.dark .config-group input, body.dark .config-group textarea { background: #334155; border-color: #475569; color: white; }
  .btn-config { background: #3b82f6; color: white; padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer; margin-right: 0.5rem; margin-top: 0.5rem; }
  .btn-config.danger { background: #ef4444; }
  .btn-config.secondary { background: #64748b; }
</style>
</head>

<body class="bg-slate-100">
<div id="app"></div>

<script>
// ======================== BASES DE DATOS ========================
// DB de usuarios (para login y gestión)
const userDB = new Dexie("SAT_Users_V2");
userDB.version(1).stores({ users: "++id, name, role, pass" });

// DB principal de gestión (reparaciones, piezas, pedidos, recordatorios)
const mainDB = new Dexie("SAT_Gestion_V2");
mainDB.version(1).stores({
  piezas: '++id, nombre, cantidad, proveedor, precioCompra, precioVenta, referencia, fechaTrami, estado, observaciones, imagen, fecha, usuario',
  pedidos: '++id, cliente, producto, precioCompra, precioVenta, cantidad, referencia, fechaTrami, estado, observaciones, fecha, usuario',
  reparaciones: '++id, ot, marca, modelo, serie, cliente, telefono, email, diagnostico, precio, estado, prioridad, accesorios, password, imagen, fecha, usuario',
  recordatorios: '++id, title, description, dueDate, priority, completed, createdAt'
});

let currentUser = null;
let currentSection = 'dashboard';
let charts = {};
let currentRange = 6;

// ======================== INICIALIZACIÓN DE USUARIOS ========================
async function initUsers() {
  await userDB.open();
  const admin = await userDB.users.where("name").equals("Daniel Farré").first();
  if (!admin) {
    await userDB.users.clear();
    await userDB.users.bulkAdd([
      { name: "Daniel Farré", role: "admin", pass: "1234" },
      { name: "José Ayala", role: "user", pass: "1234" },
      { name: "David Varillas", role: "user", pass: "1234" }
    ]);
  }
}

// ======================== FUNCIONES AUXILIARES ========================
function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

// ======================== LOGIN / LOGOUT ========================
async function login() {
  const name = document.getElementById("login_name").value.trim();
  const pass = document.getElementById("login_pass").value.trim();
  const users = await userDB.users.toArray();
  const found = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
  if (found) {
    currentUser = found;
    localStorage.setItem("sat_user", JSON.stringify(currentUser));
    renderApp();
  } else {
    alert("Usuario o contraseña incorrectos");
  }
}

function logout() {
  localStorage.removeItem("sat_user");
  currentUser = null;
  location.reload();
}

// ======================== RENDER PRINCIPAL ========================
function renderLogin() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="flex h-screen items-center justify-center bg-slate-100">
      <div class="bg-white p-6 rounded-xl shadow w-80">
        <h2 class="text-xl font-bold mb-4 text-center">SAT PRO</h2>
        <input id="login_name" placeholder="Usuario" class="w-full mb-2 p-2 border rounded">
        <input id="login_pass" type="password" placeholder="Contraseña" class="w-full mb-4 p-2 border rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Entrar</button>
      </div>
    </div>
  `;
}

let currentRender = null;

async function renderApp() {
  const app = document.getElementById("app");
  const isDark = localStorage.getItem("darkMode") === "true";
  if (isDark) document.body.classList.add("dark");
  else document.body.classList.remove("dark");
  
  app.innerHTML = `
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-16 md:w-64 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col transition-all duration-300">
        <div class="p-4 border-b border-slate-100">
          <div class="flex items-center justify-center md:justify-start gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white"><i data-lucide="wrench" class="w-5 h-5"></i></div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight hidden md:block">SAT PRO</h1>
          </div>
        </div>
        <nav class="flex-1 p-3 overflow-y-auto">
          <a href="#" onclick="changeSection('dashboard')" id="link-dashboard" class="sidebar-link active"><i data-lucide="layout-dashboard" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Resumen</span></a>
          <a href="#" onclick="changeSection('reparaciones')" id="link-reparaciones" class="sidebar-link"><i data-lucide="check-square" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Reparaciones</span></a>
          <a href="#" onclick="changeSection('piezas')" id="link-piezas" class="sidebar-link"><i data-lucide="package" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Pedido Piezas</span></a>
          <a href="#" onclick="changeSection('pedidos')" id="link-pedidos" class="sidebar-link"><i data-lucide="shopping-cart" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Pedidos Clientes</span></a>
          <a href="#" onclick="changeSection('reportes')" id="link-reportes" class="sidebar-link"><i data-lucide="bar-chart-3" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Reportes</span></a>
          <a href="#" onclick="changeSection('configuracion')" id="link-configuracion" class="sidebar-link"><i data-lucide="settings" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Configuración</span></a>
          ${currentUser.role === 'admin' ? `<a href="#" onclick="changeSection('users')" id="link-users" class="sidebar-link"><i data-lucide="users" class="w-5 h-5 mr-0 md:mr-3"></i><span class="hidden md:inline">Usuarios</span></a>` : ''}
        </nav>
        <div class="p-3 border-t border-slate-100 text-[10px] text-slate-400 text-center hidden md:block">v6.0 © 2025</div>
      </aside>
      
      <!-- Main -->
      <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8">
          <h2 id="section-title" class="text-sm md:text-lg font-semibold text-slate-700 truncate">Resumen General</h2>
          <div class="flex items-center gap-2 md:gap-4">
            <button onclick="toggleDarkMode()" id="dark-mode-btn" class="text-slate-600 hover:text-slate-800 text-xs md:text-sm p-1.5 rounded-full"><i data-lucide="moon" class="w-4 h-4"></i></button>
            <button onclick="openModal()" id="btn-new" class="bg-blue-600 hover:bg-blue-700 text-white text-xs md:text-sm px-3 md:px-4 py-1.5 md:py-2 rounded-md font-medium flex items-center gap-1 md:gap-2"><i data-lucide="plus" class="w-3 h-3 md:w-4 md:h-4"></i><span class="hidden sm:inline">Nuevo</span></button>
            <button onclick="logout()" class="text-xs md:text-sm text-slate-600">Salir</button>
          </div>
        </header>
        <div class="flex-1 overflow-y-auto p-3 md:p-8" id="view"></div>
      </main>
    </div>
  `;
  lucide.createIcons();
  changeSection('dashboard');
}

// ======================== NAVEGACIÓN ENTRE SECCIONES ========================
async function changeSection(section) {
  currentSection = section;
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const link = document.getElementById(`link-${section}`);
  if (link) link.classList.add('active');
  
  const titles = {
    dashboard: 'Resumen General',
    reparaciones: 'Órdenes de Reparación',
    piezas: 'Pedido de Piezas',
    pedidos: 'Pedidos de Clientes',
    reportes: 'Reportes y Metricas',
    configuracion: 'Configuración',
    users: 'Gestión de Usuarios'
  };
  document.getElementById('section-title').textContent = titles[section] + (currentUser ? ` - ${currentUser.name}` : '');
  const btnNew = document.getElementById('btn-new');
  if (btnNew) btnNew.style.display = (section === 'reportes' || section === 'configuracion' || section === 'users') ? 'none' : 'flex';
  
  const view = document.getElementById('view');
  if (section === 'dashboard') await renderDashboard(view);
  else if (section === 'reparaciones') await renderList(view, 'reparaciones');
  else if (section === 'piezas') await renderList(view, 'piezas');
  else if (section === 'pedidos') await renderList(view, 'pedidos');
  else if (section === 'reportes') await renderReports(view);
  else if (section === 'configuracion') await renderConfiguracion(view);
  else if (section === 'users') await renderUsers(view);
}

// ======================== DASHBOARD COMPLETO ========================
async function renderDashboard(container) {
  await updateDashboardStats();
  // El contenido se actualiza dinámicamente, pero la estructura se genera en updateDashboardStats
}

async function updateDashboardStats() {
  const view = document.getElementById('view');
  if (!view) return;
  const piezas = await mainDB.piezas.toArray();
  const pedidos = await mainDB.pedidos.toArray();
  const reparaciones = await mainDB.reparaciones.toArray();
  
  let beneficioTotal = 0;
  pedidos.forEach(p => { const c=parseFloat(p.precioCompra)||0; const v=parseFloat(p.precioVenta)||0; const cant=parseInt(p.cantidad)||1; beneficioTotal+=(v-c)*cant; });
  piezas.forEach(p => { if(p.estado==='Vendido'||p.estado==='Instalado') { const c=parseFloat(p.precioCompra)||0; const v=parseFloat(p.precioVenta)||0; beneficioTotal+=(v-c)*(parseInt(p.cantidad)||1); } });
  
  const allActivity = [];
  piezas.slice(-2).forEach(p=>p.nombre&&allActivity.push({ text:`Pieza: ${p.nombre}`, date:p.fecha?new Date(p.fecha):new Date(), icon:'package', usuario:p.usuario||'Sin asignar' }));
  pedidos.slice(-2).forEach(p=>p.cliente&&allActivity.push({ text:`Pedido: ${p.producto} - ${p.cliente}`, date:p.fecha?new Date(p.fecha):new Date(), icon:'shopping-cart', usuario:p.usuario||'Sin asignar' }));
  reparaciones.slice(-2).forEach(r=>r.ot&&allActivity.push({ text:`Reparación OT: ${r.ot}`, date:r.fecha?new Date(r.fecha):new Date(), icon:'check-square', usuario:r.usuario||'Sin asignar' }));
  allActivity.sort((a,b)=>b.date-a.date);
  
  view.innerHTML = `
    <div class="space-y-4 md:space-y-6">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6">
        <div class="flat-card p-3 md:p-6 flex items-center gap-2 md:gap-4"><div class="bg-blue-50 text-blue-600 p-2 md:p-3 rounded-full"><i data-lucide="package" class="w-4 h-4 md:w-6 md:h-6"></i></div><div><p class="text-[10px] md:text-sm text-slate-500 font-medium">Piezas Pedidas</p><h3 class="text-lg md:text-2xl font-bold text-slate-800" id="stat-piezas">${piezas.filter(p=>p.estado==='Pedido').length}</h3></div></div>
        <div class="flat-card p-3 md:p-6 flex items-center gap-2 md:gap-4"><div class="bg-green-50 text-green-600 p-2 md:p-3 rounded-full"><i data-lucide="shopping-cart" class="w-4 h-4 md:w-6 md:h-6"></i></div><div><p class="text-[10px] md:text-sm text-slate-500 font-medium">Pedidos Activos</p><h3 class="text-lg md:text-2xl font-bold text-slate-800" id="stat-pedidos">${pedidos.filter(p=>p.estado && p.estado!=='Entregado').length}</h3></div></div>
        <div class="flat-card p-3 md:p-6 flex items-center gap-2 md:gap-4"><div class="bg-amber-50 text-amber-600 p-2 md:p-3 rounded-full"><i data-lucide="clock" class="w-4 h-4 md:w-6 md:h-6"></i></div><div><p class="text-[10px] md:text-sm text-slate-500 font-medium">Reparaciones Urgentes</p><h3 class="text-lg md:text-2xl font-bold text-slate-800" id="stat-reparaciones">${reparaciones.filter(r=>r.prioridad==='Alta' && r.estado!=='Completado').length}</h3></div></div>
        <div class="flat-card p-3 md:p-6 flex items-center gap-2 md:gap-4"><div class="bg-purple-50 text-purple-600 p-2 md:p-3 rounded-full"><i data-lucide="trending-up" class="w-4 h-4 md:w-6 md:h-6"></i></div><div><p class="text-[10px] md:text-sm text-slate-500 font-medium">Beneficio Total</p><h3 class="text-sm md:text-2xl font-bold text-green-600">${beneficioTotal.toFixed(2)}€</h3></div></div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">

async function renderList(container, section) {
  const data = await mainDB[section].toArray();
  let headers = [];
  if (section === 'piezas') headers = ['Pieza', 'Proveedor', 'P.Compra', 'P.Venta', 'Usuario', 'Estado', 'Fecha', 'Imagen'];
  else if (section === 'pedidos') headers = ['Producto', 'Cliente', 'P.Compra', 'P.Venta', 'Estado', 'Fecha'];
  else if (section === 'reparaciones') headers = ['OT', 'Cliente', 'Equipo', 'Precio', 'Estado', 'Fecha', 'Imagen'];
  
  let html = `<div class="flat-card overflow-hidden"><div class="table-responsive"><table class="w-full text-left text-xs md:text-sm"><thead class="bg-slate-50 border-b border-slate-200"><tr>${headers.map(h=>`<th class="px-2 md:px-4 py-2 text-[10px] md:text-xs font-semibold text-slate-500 uppercase">${h}</th>`).join('')}<th class="px-2 md:px-4 py-2 text-right text-[10px] md:text-xs font-semibold text-slate-500 uppercase">Acciones</th></tr></thead><tbody id="table-body">`;
  if (data.length === 0) html += `<tr><td colspan="8" class="p-6 text-center text-slate-400 text-xs">No hay registros</td></tr>`;
  else {
    for (const item of data) {
      let userClass = '';
      if (item.usuario === 'Daniel Farré') userClass = 'daniel';
      else if (item.usuario === 'José Ayala') userClass = 'jose';
      else if (item.usuario === 'David Varillas') userClass = 'david';
      let content = '';
      if (section === 'piezas') {
        content = `<td class="px-2 md:px-4 py-2 text-xs font-medium">${escapeHtml(item.nombre||'-')}</td><td class="px-2 md:px-4 py-2 text-xs">${escapeHtml(item.proveedor||'-')}</td><td class="px-2 md:px-4 py-2 text-xs">${item.precioCompra||'-'}€</td><td class="px-2 md:px-4 py-2 text-xs">${item.precioVenta||'-'}€</td><td class="px-2 md:px-4 py-2"><span class="user-badge ${userClass} text-[9px]">${item.usuario}</span></td><td class="px-2 md:px-4 py-2"><span class="px-1.5 py-0.5 rounded-full text-[9px] font-bold uppercase bg-amber-100 text-amber-700">${item.estado}</span></td><td class="px-2 md:px-4 py-2 text-xs">${new Date(item.fecha).toLocaleDateString()}</td><td class="px-2 md:px-4 py-2">${item.imagen ? `<img src="${item.imagen}" class="thumbnail-img" onclick="showImageModal('${item.imagen}')">` : '-'}</td>`;
      } else if (section === 'pedidos') {
        content = `<td class="px-2 md:px-4 py-2 text-xs font-medium">${escapeHtml(item.producto||'-')}</td><td class="px-2 md:px-4 py-2 text-xs">${escapeHtml(item.cliente||'-')}</td><td class="px-2 md:px-4 py-2 text-xs">${item.precioCompra||'-'}€</td><td class="px-2 md:px-4 py-2 text-xs">${item.precioVenta||'-'}€</td><td class="px-2 md:px-4 py-2"><span class="px-1.5 py-0.5 rounded-full text-[9px] font-bold uppercase bg-amber-100 text-amber-700">${item.estado}</span></td><td class="px-2 md:px-4 py-2 text-xs">${new Date(item.fecha).toLocaleDateString()}</td>`;
      } else if (section === 'reparaciones') {
        content = `<td class="px-2 md:px-4 py-2 text-xs font-medium">${escapeHtml(item.ot||'-')}</td><td class="px-2 md:px-4 py-2 text-xs">${escapeHtml(item.cliente||'-')}</td><td class="px-2 md:px-4 py-2 text-xs">${escapeHtml(item.marca)} ${escapeHtml(item.modelo)}</td><td class="px-2 md:px-4 py-2 text-xs">${item.precio?item.precio+'€':'-'}</td><td class="px-2 md:px-4 py-2"><span class="px-1.5 py-0.5 rounded-full text-[9px] font-bold uppercase bg-amber-100 text-amber-700">${item.estado}</span></td><td class="px-2 md:px-4 py-2 text-xs">${new Date(item.fecha).toLocaleDateString()}</td><td class="px-2 md:px-4 py-2">${item.imagen ? `<img src="${item.imagen}" class="thumbnail-img" onclick="showImageModal('${item.imagen}')">` : '-'}</td>`;
      }
      html += `<tr class="hover:bg-slate-50">${content}<td class="px-2 md:px-4 py-2 text-right space-x-1"><button onclick='viewDetail("${section}", ${item.id})' class="btn-small bg-slate-100 p-1 hover:bg-green-100"><i data-lucide="eye" class="w-3 h-3"></i></button><button onclick='editRecord("${section}", ${item.id})' class="btn-small bg-slate-100 p-1 hover:bg-blue-100"><i data-lucide="edit-2" class="w-3 h-3"></i></button><button onclick='deleteRecord("${section}", ${item.id})' class="btn-small bg-slate-100 p-1 hover:bg-red-100"><i data-lucide="trash" class="w-3 h-3"></i></button><button onclick='printFromList("${section}", ${item.id})' class="btn-small bg-slate-100 p-1 hover:bg-purple-100"><i data-lucide="printer" class="w-3 h-3"></i></button></td></tr>`;
    }
  }
  html += `</tbody></table></div></div>`;
  container.innerHTML = html;
  lucide.createIcons();
}

async function updateReportsStats() {
  const piezas = await mainDB.piezas.toArray();
  const pedidos = await mainDB.pedidos.toArray();
  const reparaciones = await mainDB.reparaciones.toArray();
  let ingresosTotales=0, costePiezasTotal=0;
  pedidos.forEach(p=>{ const v=parseFloat(p.precioVenta)||0; const c=parseInt(p.cantidad)||1; ingresosTotales+=v*c; const comp=parseFloat(p.precioCompra)||0; costePiezasTotal+=comp*c; });
  piezas.forEach(p=>{ if(p.estado==='Vendido'||p.estado==='Instalado'){ ingresosTotales+=parseFloat(p.precioVenta)||0; costePiezasTotal+=parseFloat(p.precioCompra)||0; } });
  ingresosTotales += reparaciones.reduce((s,r)=>s+(parseFloat(r.precio)||0),0);
  const beneficio = ingresosTotales - costePiezasTotal;
  const margen = ingresosTotales>0 ? (beneficio/ingresosTotales*100).toFixed(1) : 0;
  document.getElementById('kpi-ingresos').textContent = ingresosTotales.toFixed(2)+'€';
  document.getElementById('kpi-coste-piezas').textContent = costePiezasTotal.toFixed(2)+'€';
  document.getElementById('kpi-beneficio').textContent = beneficio.toFixed(2)+'€';
  document.getElementById('kpi-margen').textContent = margen+'%';
  document.getElementById('kpi-total-pedidos').textContent = pedidos.length;
  document.getElementById('kpi-pedidos-entregados').textContent = pedidos.filter(p=>p.estado==='Entregado').length;
  document.getElementById('kpi-reparaciones-completadas').textContent = reparaciones.filter(r=>r.estado==='Completado'||r.estado==='Entregado').length;
  document.getElementById('kpi-piezas-pendientes').textContent = piezas.filter(p=>p.estado==='Pedido').length;
  document.getElementById('kpi-tasa-entrega').textContent = pedidos.length>0 ? Math.round(pedidos.filter(p=>p.estado==='Entregado').length/pedidos.length*100) : 0 + '%';
  // Gráficos (simplificados para no alargar)
  updateEvolucionMensual(pedidos);
  updateEvolucionPorUsuario(pedidos);
  updateRankingUsuarios(pedidos, piezas, reparaciones);
  updateDetalleVentas(pedidos, piezas);
}

async function addUser() {
  const name = document.getElementById("newUserName").value.trim();
  const pass = document.getElementById("newUserPass").value.trim();
  if (!name || !pass) return alert("Complete nombre y contraseña");
  await userDB.users.add({ name, role: "user", pass });
  renderUsers(document.getElementById("view"));
}

async function deleteUser(id) {
  await userDB.users.delete(id);
  renderUsers(document.getElementById("view"));
}
